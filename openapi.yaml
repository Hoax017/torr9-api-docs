        '200':
          description: Idea créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  user_id: { type: integer }
                  username: { type: string }
                  content: { type: string }
                  vote_count: { type: integer }
                  upvotes: { type: integer }
                  downvotes: { type: integer }
