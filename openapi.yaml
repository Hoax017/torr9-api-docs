      parameters:
        - { name: days, in: query, schema: { type: integer, default: 14 }, description: 'Attention 524 si >2j sur origin lent' }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TorrentList' } } } } }
  /api/v1/torrents/search:
    get:
      tags: [torrents]
      summary: Search (paginé + filtres)
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
        - { name: search_in, in: query, schema: { type: string, enum: [title, description] } }
        - { name: category, in: query, schema: { type: string } }
        - { name: tag, in: query, schema: { type: string } }
        - { name: uploader, in: query, schema: { type: string } }
        - { name: max_age_days, in: query, schema: { type: integer } }
        - { name: sort_by, in: query, schema: { type: string, enum: [created_at, seeders, size] } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 25 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TorrentSearchResult' }
  /api/v1/torrents/upload:
    post:
      tags: [torrents]
      summary: Upload .torrent
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/UploadTorrentForm' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadTorrentResponse' }
  /api/v1/torrents/generate-description:
    post:
      tags: [torrents]
      summary: Génère description BBCode auto (TMDB + parse NFO)
      description: |
        Sert à pré-remplir la description du formulaire upload. Récupère la metadata TMDB/Google Books/IGDB selon `category`,
        parse le `nfo` MediaInfo, et combine avec `tech_info` pour produire un BBCode formaté (poster, synopsis, casting, specs).

        Catégories non supportées: `other` (ne fait rien d'utile sans source enrichissable).
        Note: `book` peut renvoyer 429 si Google Books rate-limit.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GenerateDescRequest' }
      responses:
        '200':
          description: 'BBCode + metadata enrichies'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GenerateDescResponse' }
        '400':
          description: 'Title required ou catégorie non supportée'
        '429':
          description: 'Rate limit upstream (ex: Google Books pour category=book)'
  /api/v1/torrents/search-media:
    post:
      tags: [torrents]
      summary: Search media TMDB (pré-fill upload, autocompletion)
      description: 'Recherche TMDB côté serveur (movie/tv). Différent de `/torrents/search` qui cherche les torrents indexés. Sert au formulaire upload + page de search pour résoudre titre → tmdb_id.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SearchMediaRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchMediaResponse' }
  /api/v1/torrents/parse-metadata:
    post:
      tags: [torrents]
      summary: Parse fichier .torrent (avant upload final)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [torrent_file]
              properties:
                torrent_file: { type: string, format: binary }
      responses:
        '200':
          description: Metadata extraite
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParseMetadataResponse' }
  /api/v1/torrents/check-duplicate:
    post:
      tags: [torrents]
      summary: Vérifie doublon par titre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  has_duplicates: { type: boolean }
                  duplicates: { type: array, items: { type: object } }
  /api/v1/torrents/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
