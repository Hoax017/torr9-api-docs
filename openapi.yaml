openapi: 3.0.3
info:
  title: Torr9 API (reverse-engineered)
  version: 1.0.0
  description: |
    Spec OpenAPI reconstruite à partir des chunks JS (`/_next/static/chunks/`) et
    de captures réseau. Méthodes HTTP inférées par convention quand non observées.
    Champs réponse confirmés via fetch live pour `/auth/login` et `/torrents/exclus`.

    ## ⚠️ Try it out — extension nécessaire

    L'API `api.torr9.net` n'autorise que `Origin: https://torr9.net` en CORS.
    Les requêtes envoyées depuis cette page (github.io ou localhost) sont **bloquées par le navigateur**.

    Pour tester en live depuis ici, installe une extension de désactivation CORS:

    - **Firefox dédié (recommandé)** — [Torr9 CORS Unlock (.xpi signé)](https://github.com/Hoax017/torr9-api-docs/releases/latest)
        1. Télécharge `torr9-cors-unlock.xpi` depuis la release
        2. Ouvre Firefox → glisse-dépose le .xpi sur l'onglet `about:addons` (ou clique le `.xpi` dans Firefox direct)
        3. Confirme l'install
        4. Reste active jusqu'à suppression manuelle
    - **Chrome / Edge / Brave dédié** — [Torr9 CORS Unlock (.zip)](https://github.com/Hoax017/torr9-api-docs/releases/latest)
        1. Télécharge le `.zip` depuis la release et dezip
        2. `chrome://extensions/` → toggle **"Mode développeur"**
        3. **"Charger l'extension non empaquetée"** → sélectionne le dossier dezippé
        4. Reste active jusqu'à suppression manuelle
    - Chrome générique: [CORS Unblock](https://chrome.google.com/webstore/detail/cors-unblock/lfhmikememgdcahcdlaciloancbhjino)
    - Firefox générique: [CORS Everywhere](https://addons.mozilla.org/firefox/addon/cors-everywhere/) (ne gère pas toujours les preflights)

    Active l'extension uniquement le temps des tests, puis désactive-la (sécurité).
    Alternative: appelle l'API en `curl` ou Node avec ton token.
servers:
  - url: https://api.torr9.net
    description: Prod
  - url: https://api.torr9.xyz
    description: Dev/Staging
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        remember_me: { type: boolean, default: true }
    LoginResponse:
      type: object
      properties:
        token: { type: string, description: 'JWT HS256, ~30j' }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [user, userplus, vip, admin] }
        avatar_url: { type: string }
        passkey: { type: string }
        uploaded: { type: integer, format: int64 }
        downloaded: { type: integer, format: int64 }
        total_uploaded_bytes: { type: integer, format: int64 }
        total_downloaded_bytes: { type: integer, format: int64 }
        bonus_uploaded: { type: integer }
        bonus_downloaded: { type: integer }
        want_porn: { type: boolean }
        hide_ratio: { type: boolean }
        citation: { type: string }
        jeton_balance: { type: integer }
    Torrent:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string, description: BBCode, nullable: true }
        info_hash: { type: string, nullable: true }
        file_size_bytes: { type: integer, format: int64 }
        file_count: { type: integer, nullable: true }
        upload_date: { type: string, format: date-time }
        created_at: { type: string, format: date-time, nullable: true }
        age: { type: string, description: 'humanisé (ex 19 minutes, 1 heure)', nullable: true }
        is_freeleech: { type: boolean }
        is_exclu: { type: boolean, nullable: true }
        status: { type: string, nullable: true }
        note_admin: { type: string, nullable: true }
        tags: { type: array, items: { type: string } }
        category_name: { type: string }
        category_icon: { type: string, nullable: true }
        parent_category_name: { type: string }
        uploader_name: { type: string }
        seeders: { type: integer }
        leechers: { type: integer }
        times_completed: { type: integer }
        comment_count: { type: integer }
        tmdb_id: { type: integer, nullable: true }
        tvdb_id: { type: integer, nullable: true }
        imdb_id: { type: string, nullable: true }
        poster_url: { type: string, nullable: true }
        tmdb_overview: { type: string, nullable: true }
        team_name: { type: string, nullable: true }
        team_slug: { type: string, nullable: true }
        team_logo_url: { type: string, nullable: true }
    TorrentList:
      type: object
      properties:
        count: { type: integer }
        torrents:
          type: array
          items: { $ref: '#/components/schemas/Torrent' }
    TorrentListPaginated:
      type: object
      properties:
        count: { type: integer, description: 'taille page actuelle' }
        limit: { type: integer }
        page: { type: integer }
        total_count: { type: integer, description: 'total éléments' }
        total_pages: { type: integer }
        torrents:
          type: array
          items: { $ref: '#/components/schemas/Torrent' }
    TorrentSearchFilters:
      type: object
      properties:
        category: { type: string }
        max_age_days: { type: string }
        search_in: { type: string, enum: [title, description] }
        tag: { type: string }
        uploader: { type: string }
    TorrentSearchResult:
      type: object
      properties:
        count: { type: integer }
        current_page: { type: integer }
        limit: { type: integer }
        query: { type: string }
        filters: { $ref: '#/components/schemas/TorrentSearchFilters' }
        total_count: { type: integer }
        total_pages: { type: integer }
        torrents:
          type: array
          items: { $ref: '#/components/schemas/Torrent' }
    UploadTorrentForm:
      type: object
      required: [torrent_file, title, category, subcategory, tags]
      properties:
        torrent_file: { type: string, format: binary }
        title: { type: string }
        description: { type: string, description: BBCode }
        nfo: { type: string, format: binary, description: Optional .nfo file }
        category: { type: string }
        subcategory: { type: string }
        tags: { type: string, description: 'Comma-separated' }
        is_exclusive: { type: string, enum: ['true', 'false'] }
        is_anonymous: { type: string, enum: ['true', 'false'] }
        tmdb_id: { type: string }
        imdb_id: { type: string }
        tvdb_id: { type: string }
        mal_id: { type: string }
        igdb_id: { type: string }
        mangadex_id: { type: string }
    UploadTorrentResponse:
      type: object
      properties:
        torrent_id: { type: integer }
        download_url: { type: string, description: Path à concaténer avec baseURL }
    ParseMetadataResponse:
      type: object
      properties:
        release_name: { type: string }
        size_bytes: { type: integer, format: int64 }
        file_count: { type: integer }
    ChatBanRequest:
      type: object
      required: [username]
      properties:
        username: { type: string }
        duration: { type: integer, nullable: true, description: 'Secondes; null = perma' }
    RequestsCreate:
      type: object
      required: [title, description, bounty_amount]
      properties:
        title: { type: string }
        description: { type: string }
        bounty_amount: { type: integer, description: Jetons }
    RequestsRespond:
      type: object
      required: [torrent_id, message]
      properties:
        torrent_id: { type: integer }
        message: { type: string }
    RequestsList:
      type: object
      properties:
        requests: { type: array, items: { type: object } }
        total: { type: integer }
    PublicUser:
      type: object
      description: Profil public (pas d'email/role)
      properties:
        id: { type: integer }
        username: { type: string }
        avatar_url: { type: string }
        total_uploaded_bytes: { type: integer, format: int64 }
        total_downloaded_bytes: { type: integer, format: int64 }
        bonus_uploaded: { type: integer, format: int64 }
        bonus_downloaded: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
    ChatChannel:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        type: { type: string, enum: [public, private, restricted] }
        icon: { type: string }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
    ChatMessage:
      type: object
      properties:
        id: { type: integer }
        channel_id: { type: integer }
        user_id: { type: integer }
        content: { type: string }
        reply_to_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        username: { type: string }
        avatar_url: { type: string }
        role: { type: string }
        reactions: { type: array, items: { type: object } }
        reply_to:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            content: { type: string }
            username: { type: string }
    ChatMessages:
      type: object
      properties:
        has_more: { type: boolean }
        messages: { type: array, items: { $ref: '#/components/schemas/ChatMessage' } }
    Idea:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        username: { type: string }
        content: { type: string }
        vote_count: { type: integer }
        upvotes: { type: integer }
        downvotes: { type: integer }
        has_voted: { type: boolean }
        user_vote: { type: integer, description: '-1, 0, 1' }
        created_at: { type: string, format: date-time }
    LeaderboardEntry:
      type: object
      properties:
        rank: { type: integer }
        user_id: { type: integer }
        username: { type: string }
        avatar_url: { type: string }
        role: { type: string }
        torrents_uploaded: { type: integer }
        total_uploaded_bytes: { type: integer, format: int64 }
        jeton_balance: { type: integer }
        composite_score: { type: number, format: float }
    SiteStats:
      type: object
      properties:
        active_torrents: { type: integer }
        pending_torrents: { type: integer }
        sw_torrents: { type: integer, description: 'ShareWood torrents' }
        total_data_exchanged: { type: integer, format: int64 }
        crossseed_data_exchanged: { type: integer, format: int64 }
        total_peers: { type: integer }
        users: { type: integer }
    NotificationsCount:
      type: object
      properties: { unread: { type: integer } }
    Announcement:
      type: object
      properties:
        enabled: { type: boolean }
        message: { type: string, description: HTML }
    PoolDonor:
      type: object
      properties:
        username: { type: string }
        amount: { type: integer }
    PoolStatus:
      type: object
      properties:
        pool:
          type: object
          properties:
            id: { type: integer }
            goal_amount: { type: integer }
            current_amount: { type: integer }
            status: { type: string, enum: [active, completed, closed] }
            created_at: { type: string, format: date-time }
        top_donors:
          type: array
          items: { $ref: '#/components/schemas/PoolDonor' }
    AuctionSlot:
      type: object
      properties:
        slot_type: { type: string, enum: [uploader, userplus] }
        total_slots: { type: integer }
        occupied_slots: { type: integer }
        active_bids: { type: array, items: { type: object } }
        pending_bids: { type: array, items: { type: object } }
    AuctionState:
      type: object
      properties:
        uploader_slots: { $ref: '#/components/schemas/AuctionSlot' }
        userplus_slots: { $ref: '#/components/schemas/AuctionSlot' }
        min_bid_amount: { type: integer }
    EarnRule:
      type: object
      properties:
        action: { type: string }
        description: { type: string }
        amount: { type: string }
        icon: { type: string }
    JetonsMilestone:
      type: object
      properties:
        count: { type: integer }
        reward: { type: integer }
        reached: { type: boolean }
        label: { type: string }
    JetonsOverview:
      type: object
      properties:
        balance: { type: integer }
        earn_rules: { type: array, items: { $ref: '#/components/schemas/EarnRule' } }
        milestones: { type: array, items: { $ref: '#/components/schemas/JetonsMilestone' } }
        total_earned: { type: integer }
        total_spent: { type: integer }
        upload_count: { type: integer }
    JetonsShopItem:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        price: { type: integer }
        category: { type: string }
        effect_type: { type: string }
        effect_value: { type: integer, format: int64 }
        is_active: { type: boolean }
        sort_order: { type: integer }
        max_purchases: { type: integer }
        user_purchase_count: { type: integer }
    JetonsShop:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/JetonsShopItem' } }
        shop_enabled: { type: boolean }
    JetonsHistory:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        transactions: { type: array, items: { type: object } }
    FeaturedItem:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, enum: [movie, tv] }
        tmdb_id: { type: integer }
        torrent_id: { type: integer }
        display_order: { type: integer }
        is_active: { type: boolean }
        poster_url: { type: string }
        title: { type: string }
    FeaturedList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/FeaturedItem' } }
    InvitationCodes:
      type: object
      properties:
        codes: { type: array, items: { type: object } }
        remaining: { type: integer }
    CommentList:
      type: object
      properties:
        comments: { type: array, items: { type: object }, nullable: true }
        count: { type: integer }
    UnreadCounts:
      type: object
      properties:
        channels: { type: object, additionalProperties: { type: integer } }
        conversations: { type: object, additionalProperties: { type: integer } }
        total_unread: { type: integer }
    FAQ:
      type: object
      properties:
        categories:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              items:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    question: { type: string }
                    answer: { type: string }
    Rules:
      type: object
      properties:
        categories:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              items:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    title: { type: string }
                    content: { type: string }
    SponsoredTorrentsList:
      type: object
      properties:
        torrents: { type: array, items: { type: object } }
    EmotesList:
      type: object
      properties:
        emotes: { type: array, items: { type: object } }
    PollsList:
      type: object
      properties:
        polls: { type: array, items: { type: object }, nullable: true }
    RssKey:
      type: object
      properties:
        rss_key: { type: string }

paths:
  # ===== AUTH =====
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Token + user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401': { description: Bad creds, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '403':
          description: Banned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      ban_reason: { type: string }
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password, invitation_code]
              properties:
                username: { type: string }
                email: { type: string, format: email }
                password: { type: string, format: password }
                invitation_code: { type: string }
                captcha_token: { type: string }
      responses:
        '201': { description: Created }
  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh JWT (pas de body, juste Bearer)
      responses:
        '200':
          description: New token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  message: { type: string }
  /api/v1/auth/forgot-password:
    post:
      tags: [auth]
      summary: Demande reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses: { '200': { description: OK } }
  /api/v1/auth/reset-password:
    post:
      tags: [auth]
      summary: Reset password (token reçu par email)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, format: password }
      responses: { '200': { description: OK } }
  /api/v1/auth/discourse/connect:
    get:
      tags: [auth]
      summary: SSO Discourse (GET retourne 404, probablement POST)
      responses:
        '404': { description: 'Probably wrong method (try POST)' }

  # ===== USERS =====
  /api/v1/users/me:
    get: { tags: [users], summary: Profil courant, responses: { '200': { description: User, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } } } }
  /api/v1/users/{id}:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    get:
      tags: [users]
      summary: Profil public
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicUser' }
  /api/v1/users/{id}/avatar:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    post: { tags: [users], summary: Upload avatar, requestBody: { content: { multipart/form-data: { schema: { type: object, properties: { file: { type: string, format: binary } } } } } }, responses: { '200': { description: OK } } }
  /api/v1/users/{id}/email:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    patch: { tags: [users], summary: Change email, responses: { '200': { description: OK } } }
  /api/v1/users/{id}/password:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    patch: { tags: [users], summary: Change mdp, responses: { '200': { description: OK } } }
  /api/v1/users/{id}/want-porn:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    patch: { tags: [users], summary: Toggle want_porn, responses: { '200': { description: OK } } }
  /api/v1/users/{id}/hide-ratio:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    patch: { tags: [users], summary: Toggle hide_ratio, responses: { '200': { description: OK } } }
  /api/v1/users/{id}/citation:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    patch: { tags: [users], summary: Set citation, responses: { '200': { description: OK } } }
  /api/v1/users/{id}/regenerate-passkey:
    parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
    post: { tags: [users], summary: Régénère passkey, responses: { '200': { description: OK } } }

  # ===== TORRENTS =====
  /api/v1/torrents:
    get:
      tags: [torrents]
      summary: List torrents
      parameters:
        - { name: page, in: query, schema: { type: integer } }
        - { name: limit, in: query, schema: { type: integer } }
      responses:
        '200': { description: Liste, content: { application/json: { schema: { $ref: '#/components/schemas/TorrentList' } } } }
  /api/v1/torrents/recent:
    get:
      tags: [torrents]
      summary: Récents (paginé)
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 15 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TorrentListPaginated' }
  /api/v1/torrents/exclus:
    get:
      tags: [torrents]
      summary: Exclusivités (releases internes), fenêtre N jours
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 14 }, description: 'Attention 524 si >2j sur origin lent' }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/TorrentList' } } } } }
  /api/v1/torrents/search:
    get:
      tags: [torrents]
      summary: Search (paginé + filtres)
      parameters:
        - { name: q, in: query, required: true, schema: { type: string } }
        - { name: search_in, in: query, schema: { type: string, enum: [title, description] } }
        - { name: category, in: query, schema: { type: string } }
        - { name: tag, in: query, schema: { type: string } }
        - { name: uploader, in: query, schema: { type: string } }
        - { name: max_age_days, in: query, schema: { type: integer } }
        - { name: sort_by, in: query, schema: { type: string, enum: [created_at, seeders, size] } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 25 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TorrentSearchResult' }
  /api/v1/torrents/upload:
    post:
      tags: [torrents]
      summary: Upload .torrent
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/UploadTorrentForm' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UploadTorrentResponse' }
  /api/v1/torrents/parse-metadata:
    post:
      tags: [torrents]
      summary: Parse fichier .torrent (avant upload final)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [torrent_file]
              properties:
                torrent_file: { type: string, format: binary }
      responses:
        '200':
          description: Metadata extraite
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ParseMetadataResponse' }
  /api/v1/torrents/check-duplicate:
    post:
      tags: [torrents]
      summary: Vérifie doublon par titre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
