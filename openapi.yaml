openapi: 3.0.3
info:
  title: Torr9 API (reverse-engineered)
  version: 1.0.0
  description: |
    Spec OpenAPI reconstruite à partir des chunks JS (`/_next/static/chunks/`) et
    de captures réseau. Méthodes HTTP inférées par convention quand non observées.
    Champs réponse confirmés via fetch live pour `/auth/login` et `/torrents/exclus`.

    ## ⚠️ Try it out — extension nécessaire

    L'API `api.torr9.net` n'autorise que `Origin: https://torr9.net` en CORS.
    Les requêtes envoyées depuis cette page (github.io ou localhost) sont **bloquées par le navigateur**.

    Pour tester en live depuis ici, installe une extension de désactivation CORS:

    - **Firefox dédié (recommandé)** — [Torr9 CORS Unlock (.xpi signé)](https://github.com/Hoax017/torr9-api-docs/releases/latest)
        1. Télécharge `torr9-cors-unlock.xpi` depuis la release
        2. Ouvre Firefox → glisse-dépose le .xpi sur l'onglet `about:addons` (ou clique le `.xpi` dans Firefox direct)
        3. Confirme l'install
        4. Reste active jusqu'à suppression manuelle
    - **Chrome / Edge / Brave dédié** — [Torr9 CORS Unlock (.zip)](https://github.com/Hoax017/torr9-api-docs/releases/latest)
        1. Télécharge le `.zip` depuis la release et dezip
        2. `chrome://extensions/` → toggle **"Mode développeur"**
        3. **"Charger l'extension non empaquetée"** → sélectionne le dossier dezippé
        4. Reste active jusqu'à suppression manuelle
    - Chrome générique: [CORS Unblock](https://chrome.google.com/webstore/detail/cors-unblock/lfhmikememgdcahcdlaciloancbhjino)
    - Firefox générique: [CORS Everywhere](https://addons.mozilla.org/firefox/addon/cors-everywhere/) (ne gère pas toujours les preflights)

    Active l'extension uniquement le temps des tests, puis désactive-la (sécurité).
    Alternative: appelle l'API en `curl` ou Node avec ton token.
servers:
  - url: https://api.torr9.net
    description: Prod
  - url: https://api.torr9.xyz
    description: Dev/Staging
security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        remember_me: { type: boolean, default: true }
    LoginResponse:
      type: object
      properties:
        token: { type: string, description: 'JWT HS256, ~30j' }
        user: { $ref: '#/components/schemas/User' }
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [user, userplus, vip, admin] }
        avatar_url: { type: string }
        passkey: { type: string }
        uploaded: { type: integer, format: int64 }
        downloaded: { type: integer, format: int64 }
        total_uploaded_bytes: { type: integer, format: int64 }
        total_downloaded_bytes: { type: integer, format: int64 }
        bonus_uploaded: { type: integer }
        bonus_downloaded: { type: integer }
        want_porn: { type: boolean }
        hide_ratio: { type: boolean }
        citation: { type: string }
        jeton_balance: { type: integer }
    Torrent:
      type: object
      description: 'Champs varient selon endpoint (recent/search/list/detail). Les champs non-applicables sont absents ou null.'
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string, description: BBCode, nullable: true }
        info_hash: { type: string, nullable: true }
        magnet_link: { type: string, nullable: true }
        torrent_file_url: { type: string, nullable: true, description: 'path relatif (uploads/torrents/{hash}.torrent)' }
        file_size_bytes: { type: integer, format: int64 }
        file_count: { type: integer, nullable: true }
        upload_date: { type: string, format: date-time }
        created_at: { type: string, format: date-time, nullable: true }
        age: { type: string, description: 'humanisé (ex 19 minutes, 1 heure)', nullable: true }
        is_freeleech: { type: boolean }
        is_exclu: { type: boolean, nullable: true }
        is_private: { type: boolean, nullable: true }
        is_anon: { type: boolean, nullable: true }
        status: { type: string, nullable: true, description: 'active, pending, etc.' }
        note_admin: { type: string, nullable: true }
        tags: { type: array, items: { type: string } }
        category_id: { type: integer, nullable: true }
        category_name: { type: string, nullable: true }
        category_icon: { type: string, nullable: true }
        parent_category_name: { type: string, nullable: true }
        uploader_id: { type: integer, nullable: true }
        uploader_name: { type: string, nullable: true }
        seeders: { type: integer, nullable: true }
        leechers: { type: integer, nullable: true }
        times_completed: { type: integer, nullable: true }
        comment_count: { type: integer, nullable: true }
        tmdb_id: { type: integer, nullable: true }
        tvdb_id: { type: integer, nullable: true }
        imdb_id: { type: string, nullable: true }
        poster_url: { type: string, nullable: true }
        tmdb_overview: { type: string, nullable: true }
        team_name: { type: string, nullable: true }
        team_slug: { type: string, nullable: true }
        team_logo_url: { type: string, nullable: true }
    TorrentList:
      type: object
      properties:
        count: { type: integer }
        torrents:
          type: array
          items: { $ref: '#/components/schemas/Torrent' }
    TorrentListSimple:
      type: object
      description: 'Wrapper minimal sans pagination (limit + page + torrents[]). Inclut description/magnet_link/torrent_file_url contrairement à recent.'
      properties:
        limit: { type: integer }
        page: { type: integer }
        torrents:
          type: array
          items: { $ref: '#/components/schemas/Torrent' }
    TorrentListPaginated:
      type: object
      properties:
        count: { type: integer, description: 'taille page actuelle' }
        limit: { type: integer }
        page: { type: integer }
        total_count: { type: integer, description: 'total éléments' }
        total_pages: { type: integer }
        torrents:
          type: array
          items: { $ref: '#/components/schemas/Torrent' }
    TorrentSearchFilters:
      type: object
      properties:
        category: { type: string }
        max_age_days: { type: string }
        search_in: { type: string, enum: [title, description] }
        tag: { type: string }
        uploader: { type: string }
    TorrentSearchResult:
      type: object
      properties:
        count: { type: integer }
        current_page: { type: integer }
        limit: { type: integer }
        query: { type: string }
        filters: { $ref: '#/components/schemas/TorrentSearchFilters' }
        total_count: { type: integer }
        total_pages: { type: integer }
        torrents:
          type: array
          items: { $ref: '#/components/schemas/Torrent' }
    UploadTorrentForm:
      type: object
      required: [torrent_file, title, category, subcategory, tags]
      properties:
        torrent_file: { type: string, format: binary }
        title: { type: string }
        description: { type: string, description: BBCode }
        nfo: { type: string, format: binary, description: Optional .nfo file }
        category: { type: string }
        subcategory: { type: string }
        tags: { type: string, description: 'Comma-separated' }
        is_exclusive: { type: string, enum: ['true', 'false'] }
        is_anonymous: { type: string, enum: ['true', 'false'] }
        tmdb_id: { type: string }
        imdb_id: { type: string }
        tvdb_id: { type: string }
        mal_id: { type: string }
        igdb_id: { type: string }
        mangadex_id: { type: string }
    UploadTorrentResponse:
      type: object
      properties:
        torrent_id: { type: integer }
        download_url: { type: string, description: Path à concaténer avec baseURL }
    ParseMetadataResponse:
      type: object
      properties:
        release_name: { type: string }
        size_bytes: { type: integer, format: int64 }
        file_count: { type: integer }
    ChatBanRequest:
      type: object
      required: [username]
      properties:
        username: { type: string }
        duration: { type: integer, nullable: true, description: 'Secondes; null = perma' }
    RequestsCreate:
      type: object
      required: [title, description, bounty_amount]
      properties:
        title: { type: string }
        description: { type: string }
        bounty_amount: { type: integer, description: Jetons }
    RequestsRespond:
      type: object
      required: [torrent_id, message]
      properties:
        torrent_id: { type: integer }
        message: { type: string }
    Request:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        username: { type: string }
        title: { type: string }
        description: { type: string }
        bounty_amount: { type: integer, description: 'jetons' }
        status: { type: string, enum: [open, fulfilled, closed, cancelled] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        response_count: { type: integer, nullable: true }
        fulfilled_by: { type: integer, nullable: true }
        fulfilled_by_name: { type: string, nullable: true }
        fulfilled_at: { type: string, format: date-time, nullable: true }
    RequestResponse:
      type: object
      properties:
        id: { type: integer }
        request_id: { type: integer }
        user_id: { type: integer }
        username: { type: string }
        torrent_id: { type: integer }
        torrent_title: { type: string }
        message: { type: string }
        status: { type: string, enum: [pending, accepted, rejected] }
        created_at: { type: string, format: date-time }
    RequestsList:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        requests:
          type: array
          items: { $ref: '#/components/schemas/Request' }
    PublicUser:
      type: object
      description: Profil public (pas d'email/role)
      properties:
        id: { type: integer }
        username: { type: string }
        avatar_url: { type: string }
        total_uploaded_bytes: { type: integer, format: int64 }
        total_downloaded_bytes: { type: integer, format: int64 }
        bonus_uploaded: { type: integer, format: int64 }
        bonus_downloaded: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
    ChatChannel:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        type: { type: string, enum: [public, private, restricted] }
        icon: { type: string }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
    ChatMessage:
      type: object
      properties:
        id: { type: integer }
        channel_id: { type: integer }
        user_id: { type: integer }
        content: { type: string }
        reply_to_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
        username: { type: string }
        avatar_url: { type: string }
        role: { type: string }
        reactions: { type: array, items: { type: object } }
        reply_to:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            content: { type: string }
            username: { type: string }
    ChatMessages:
      type: object
      properties:
        has_more: { type: boolean }
        messages: { type: array, items: { $ref: '#/components/schemas/ChatMessage' } }
    Idea:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        username: { type: string }
        content: { type: string }
        vote_count: { type: integer }
        upvotes: { type: integer }
        downvotes: { type: integer }
        has_voted: { type: boolean }
        user_vote: { type: integer, description: '-1, 0, 1' }
        created_at: { type: string, format: date-time }
    LeaderboardEntry:
      type: object
      properties:
        rank: { type: integer }
        user_id: { type: integer }
        username: { type: string }
        avatar_url: { type: string }
        role: { type: string }
        torrents_uploaded: { type: integer }
        total_uploaded_bytes: { type: integer, format: int64 }
        jeton_balance: { type: integer }
        composite_score: { type: number, format: float }
    SiteStats:
      type: object
      properties:
        active_torrents: { type: integer }
        pending_torrents: { type: integer }
        sw_torrents: { type: integer, description: 'ShareWood torrents' }
        total_data_exchanged: { type: integer, format: int64 }
        crossseed_data_exchanged: { type: integer, format: int64 }
        total_peers: { type: integer }
        users: { type: integer }
    NotificationsCount:
      type: object
      properties: { unread: { type: integer } }
    Announcement:
      type: object
      properties:
        enabled: { type: boolean }
        message: { type: string, description: HTML }
    PoolDonor:
      type: object
      properties:
        username: { type: string }
        amount: { type: integer }
    PoolStatus:
      type: object
      properties:
        pool:
          type: object
          properties:
            id: { type: integer }
            goal_amount: { type: integer }
            current_amount: { type: integer }
            status: { type: string, enum: [active, completed, closed] }
            created_at: { type: string, format: date-time }
        top_donors:
          type: array
          items: { $ref: '#/components/schemas/PoolDonor' }
    AuctionSlot:
      type: object
      properties:
        slot_type: { type: string, enum: [uploader, userplus] }
        total_slots: { type: integer }
        occupied_slots: { type: integer }
        active_bids: { type: array, items: { type: object } }
        pending_bids: { type: array, items: { type: object } }
    AuctionState:
      type: object
      properties:
        uploader_slots: { $ref: '#/components/schemas/AuctionSlot' }
        userplus_slots: { $ref: '#/components/schemas/AuctionSlot' }
        min_bid_amount: { type: integer }
    EarnRule:
      type: object
      properties:
        action: { type: string }
        description: { type: string }
        amount: { type: string }
        icon: { type: string }
    JetonsMilestone:
      type: object
      properties:
        count: { type: integer }
        reward: { type: integer }
        reached: { type: boolean }
        label: { type: string }
    JetonsOverview:
      type: object
      properties:
        balance: { type: integer }
        earn_rules: { type: array, items: { $ref: '#/components/schemas/EarnRule' } }
        milestones: { type: array, items: { $ref: '#/components/schemas/JetonsMilestone' } }
        total_earned: { type: integer }
        total_spent: { type: integer }
        upload_count: { type: integer }
    JetonsShopItem:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        description: { type: string }
        price: { type: integer }
        category: { type: string }
        effect_type: { type: string }
        effect_value: { type: integer, format: int64 }
        is_active: { type: boolean }
        sort_order: { type: integer }
        max_purchases: { type: integer }
        user_purchase_count: { type: integer }
    JetonsShop:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/JetonsShopItem' } }
        shop_enabled: { type: boolean }
    JetonsHistory:
      type: object
      properties:
        page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        transactions: { type: array, items: { type: object } }
    FeaturedItem:
      type: object
      properties:
        id: { type: integer }
        type: { type: string, enum: [movie, tv] }
        tmdb_id: { type: integer }
        torrent_id: { type: integer }
        display_order: { type: integer }
        is_active: { type: boolean }
        poster_url: { type: string }
        title: { type: string }
    FeaturedList:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/FeaturedItem' } }
    InvitationCodes:
      type: object
      properties:
        codes: { type: array, items: { type: object } }
        remaining: { type: integer }
    CommentList:
      type: object
      properties:
        comments: { type: array, items: { type: object }, nullable: true }
        count: { type: integer }
    UnreadCounts:
      type: object
      properties:
        channels: { type: object, additionalProperties: { type: integer } }
        conversations: { type: object, additionalProperties: { type: integer } }
        total_unread: { type: integer }
    FAQ:
      type: object
      properties:
        categories:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              items:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    question: { type: string }
                    answer: { type: string, description: 'Markdown ou HTML selon entry' }
                    category: { type: string }
                    sort_order: { type: integer }
                    is_active: { type: boolean }
    Rules:
      type: object
      properties:
        categories:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              items:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer }
                    title: { type: string }
                    content: { type: string, description: HTML }
                    category: { type: string }
                    sort_order: { type: integer }
                    is_active: { type: boolean }
    SponsoredTorrentsList:
      type: object
      properties:
        torrents: { type: array, items: { type: object } }
    EmotesList:
      type: object
      properties:
        emotes: { type: array, items: { type: object } }
    PollsList:
      type: object
      properties:
        polls: { type: array, items: { type: object }, nullable: true }
    RssKey:
      type: object
      properties:
        rss_key: { type: string }
    SearchMediaRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        category: { type: string, enum: [movie, tv], description: 'filtre TMDB' }
    SearchMediaItem:
      type: object
      properties:
        id: { type: string, description: 'TMDB id (string, pas integer)' }
        title: { type: string }
        year: { type: string, description: 'année (peut être vide)' }
        poster_url: { type: string }
        rating: { type: number }
        metacritic: { type: number }
        description: { type: string }
        media_type: { type: string, enum: [movie, tv] }
    SearchMediaResponse:
      type: object
      properties:
        count: { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/SearchMediaItem' }
    GenerateDescTechInfo:
      type: object
      properties:
        source: { type: string, example: WEBRip }
        resolution: { type: string, example: 1080p }
        video_format: { type: string, example: MKV }
        video_codec: { type: string, example: x265 }
        video_bitrate: { type: string, example: '5000' }
        audio: { type: string, example: 'EAC3 5.1' }
        subtitles: { type: string, example: Français }
    GenerateDescRequest:
      type: object
      required: [title, category]
      properties:
        title: { type: string }
        nfo: { type: string, description: 'NFO MediaInfo brut (optionnel)' }
        category: { type: string, enum: [movie, tv, music, book, game], description: 'type de la catégorie (cf categories.json)' }
        tmdb_id: { type: integer }
        release_name: { type: string }
        size_bytes: { type: integer, format: int64 }
        file_count: { type: integer }
        tech_info: { $ref: '#/components/schemas/GenerateDescTechInfo' }
    GenerateDescMetadata:
      type: object
      properties:
        title: { type: string, description: 'titre traduit FR' }
        backdrop_url: { type: string }
        poster_url: { type: string }
        genres: { type: array, items: { type: string } }
        imdb_id: { type: string }
        tmdb_id: { type: integer }
        tvdb_id: { type: integer }
        rating: { type: number }
        release_year: { type: integer }
        synopsis: { type: string }
    GenerateDescNfoData:
      type: object
      properties:
        bitrate: { type: integer }
        resolution: { type: string }
        source: { type: string }
        video_codec: { type: string }
    GenerateDescResponse:
      type: object
      properties:
        description: { type: string, description: 'BBCode prêt à coller dans le formulaire upload' }
        metadata: { $ref: '#/components/schemas/GenerateDescMetadata' }
        nfo_data: { $ref: '#/components/schemas/GenerateDescNfoData' }
    TeamMember:
      type: object
      properties:
        id: { type: integer }
        team_id: { type: integer }
        user_id: { type: integer }
        username: { type: string }
        avatar_url: { type: string }
        role: { type: string, example: Membre }
        joined_at: { type: string, format: date-time }
    Team:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        logo_url: { type: string }
        banner_url: { type: string }
        founded_date: { type: string }
        website: { type: string }
        torrents_url: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        members:
          type: array
          items: { $ref: '#/components/schemas/TeamMember' }
    TeamsList:
      type: object
      properties:
        teams:
          type: array
          items: { $ref: '#/components/schemas/Team' }
    SharewoodTorrent:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        info_hash: { type: string }
        file_size_bytes: { type: integer, format: int64 }
        file_count: { type: integer }
        upload_date: { type: string, format: date-time }
        seeders: { type: integer }
        leechers: { type: integer }
        times_completed: { type: integer }
        tags: { type: array, items: { type: string } }
        category_id: { type: integer }
        category_name: { type: string }
    SharewoodList:
      type: object
      properties:
        limit: { type: integer }
        page: { type: integer }
        torrents:
          type: array
          items: { $ref: '#/components/schemas/SharewoodTorrent' }
    RssEnclosure:
      type: object
      xml: { name: enclosure }
      properties:
        url: { type: string, xml: { attribute: true } }
        length: { type: integer, format: int64, xml: { attribute: true } }
        type: { type: string, xml: { attribute: true }, example: 'application/x-bittorrent' }
    RssItem:
      type: object
      xml: { name: item }
      properties:
        title: { type: string }
        link: { type: string, description: 'URL page torrent' }
        description: { type: string, description: 'Uploaded by X | Size: Y | Category: Z' }
        pubDate: { type: string, description: 'RFC 822 date' }
        category: { type: string }
        guid: { type: string, description: 'identique à link' }
        enclosure: { $ref: '#/components/schemas/RssEnclosure' }
    RssChannel:
      type: object
      xml: { name: channel }
      properties:
        title: { type: string, example: 'Torr9 - Torrents Récents' }
        link: { type: string, example: 'https://torr9.net' }
        description: { type: string }
        language: { type: string, example: 'fr-FR' }
        item:
          type: array
          xml: { wrapped: false }
          items: { $ref: '#/components/schemas/RssItem' }
    RssFeed:
      type: object
      xml: { name: rss }
      description: 'Flux RSS 2.0 (Content-Type: application/rss+xml)'
      properties:
        version: { type: string, xml: { attribute: true }, example: '2.0' }
        channel: { $ref: '#/components/schemas/RssChannel' }

paths:
  # ===== AUTH =====
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
