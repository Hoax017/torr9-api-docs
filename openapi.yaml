    post:
      tags: [ideas]
      summary: Create idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string, minLength: 3 }
      responses:
        '200':
          description: Idea créée
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  user_id: { type: integer }
                  username: { type: string }
                  content: { type: string }
                  vote_count: { type: integer }
                  upvotes: { type: integer }
                  downvotes: { type: integer }
                  has_voted: { type: boolean }
                  user_vote: { type: integer }
                  created_at: { type: string, format: date-time }
    delete:
      tags: [ideas]
      summary: Delete idea (body JSON requis — non-standard)
      description: '⚠️ L''API attend un body JSON sur DELETE (non-standard OpenAPI). Swagger UI strict refuse le rendu — utilise Redoc.'
      requestBody:
